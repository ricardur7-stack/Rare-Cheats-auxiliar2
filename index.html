<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VETRIX PRO</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system;
}

body {
  background: radial-gradient(circle at top, #1a0000, #000);
  color:white;
}

/* LOGIN */
#login {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card {
  width:90%;
  max-width:320px;
  padding:30px;
  border-radius:20px;
  background:#0f0f0f;
  box-shadow:0 0 40px rgba(255,0,0,0.3);
  text-align:center;
  animation:fade 0.5s ease;
}

.card h2 {
  color:red;
  margin-bottom:20px;
}

input {
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
  margin-top:10px;
}

button {
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-weight:bold;
}

/* PANEL */
#panel {
  display:none;
  padding:15px;
}

.box {
  max-width:420px;
  margin:auto;
  background:#0f0f0f;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(255,0,0,0.2);
}

/* HEADER */
.title {
  text-align:center;
  font-size:22px;
  margin-bottom:10px;
}

.line {
  height:2px;
  background:red;
  margin-bottom:15px;
}

/* TABS */
.tabs {
  display:flex;
  gap:10px;
}

.tab {
  flex:1;
  padding:12px;
  border-radius:10px;
  background:#1a1a1a;
  text-align:center;
}

.active {
  background:red;
}

/* SWITCH */
.switch {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:15px;
}

.switch input {
  width:40px;
}

/* SLIDER */
.slider {
  width:100%;
  margin-top:10px;
}

/* SELECT */
select {
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:10px;
  background:#1a1a1a;
  color:white;
  border:1px solid red;
}

/* RADIO */
.radio {
  margin-top:10px;
}

/* BTN INJETAR */
.inject {
  margin-top:20px;
  padding:16px;
  background:red;
  text-align:center;
  border-radius:12px;
  font-weight:bold;
}

/* STATUS */
#status {
  font-size:12px;
  color:#aaa;
  text-align:center;
  margin-bottom:10px;
}

/* ANIMAÇÃO */
@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>VETRIX</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button onclick="entrar()">ENTRAR</button>
    <p id="msg"></p>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="box">

    <div class="title">AUXILIO AURA</div>
    <div class="line"></div>

    <div id="status"></div>

    <div class="tabs">
      <div class="tab active">Aimbot</div>
      <div class="tab">Info</div>
    </div>

    <div class="switch">
      <input type="checkbox"> Ativar Auxílio
    </div>

    <div class="switch">
      <input type="checkbox"> Ativar FOV
    </div>

    <input type="range" min="0" max="100" value="0" class="slider" id="fov" oninput="updateFov()">
    <p id="fovTxt">FOV: 0</p>

    <select>
      <option>Auxílio Head</option>
      <option>Auxílio Body</option>
    </select>

    <div class="line"></div>

    <p>Tipo de Aimbot:</p>

    <div class="radio">
      <input type="radio" name="aim"> Ao Atirar
    </div>

    <div class="radio">
      <input type="radio" name="aim"> Ao Olhar
    </div>

    <div class="inject" onclick="inject()">INJETAR FUNÇÕES NO JOGO</div>

    <button onclick="abrirFF()">ABRIR FREE FIRE</button>
    <button onclick="logout()">SAIR</button>

  </div>
</div>

<script>
// FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyBlug6Fm9HjfWaaMOUHGNJVHpW97BvBF-g",
    authDomain: "vetrix7-1d0cd.firebaseapp.com",
    databaseURL: "https://vetrix7-1d0cd-default-rtdb.firebaseio.com",
    projectId: "vetrix7-1d0cd"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// AUTO LOGIN
const saved = localStorage.getItem("key");
if(saved) validar(saved);

function entrar(){
    const key = document.getElementById("keyInput").value;
    validar(key);
}

function validar(key){
    db.ref("keys").once("value").then(snap=>{
        let ok=false;

        snap.forEach(s=>{
            const k=s.val();

            if(k.key===key){
                const now=new Date();
                const exp=new Date(k.expiresAt);

                if(now<=exp){
                    ok=true;

                    localStorage.setItem("key",key);

                    document.getElementById("login").style.display="none";
                    document.getElementById("panel").style.display="block";

                    document.getElementById("status").innerText=
                      "Ativa até "+exp.toLocaleDateString();

                    return true;
                }
            }
        });

        if(!ok){
            document.getElementById("msg").innerText="Key inválida";
        }
    });
}

function logout(){
    localStorage.removeItem("key");
    location.reload();
}

function updateFov(){
  document.getElementById("fovTxt").innerText =
    "FOV: " + document.getElementById("fov").value;
}

function inject(){
  alert("Funções aplicadas!");
}

function abrirFF(){
  window.location.href="freefire://";

  setTimeout(()=>{
    window.location.href="https://apps.apple.com/app/free-fire/id1300146617";
  },2000);
}
</script>

</body>
</html>
