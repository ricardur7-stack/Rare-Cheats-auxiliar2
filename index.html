<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VETRIX</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system;}

body{
  background: radial-gradient(circle at top,#1a0000,#000);
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:90%;
  max-width:330px;
  padding:30px;
  border-radius:25px;
  background:rgba(20,0,0,0.6);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,0,0,0.2);
  box-shadow:0 0 40px rgba(255,0,0,0.3);
  text-align:center;
}

.card h2{
  color:#ff2e2e;
  margin-bottom:15px;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1a1a1a;
  color:white;
  margin-top:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:12px;
  background:linear-gradient(red,#700000);
  color:white;
  font-weight:bold;
}

/* PANEL */
#panel{display:none;padding:15px;}

.box{
  max-width:420px;
  margin:auto;
  padding:20px;
  border-radius:25px;
  background:#0f0f0f;
  box-shadow:0 0 30px rgba(255,0,0,0.2);
}

/* HEADER */
.title{
  text-align:center;
  font-size:22px;
  letter-spacing:2px;
}

.line{
  height:2px;
  background:red;
  margin:15px 0;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
}

.tab{
  flex:1;
  padding:12px;
  border-radius:10px;
  text-align:center;
  background:#1a1a1a;
  transition:.3s;
}

.tab.active{
  background:red;
}

/* SWITCH */
.switch{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-top:15px;
}

.toggle{
  width:45px;
  height:24px;
  background:#333;
  border-radius:20px;
  position:relative;
}

.toggle::before{
  content:"";
  width:20px;
  height:20px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:2px;
  transition:.3s;
}

input:checked + .toggle{
  background:red;
}

input:checked + .toggle::before{
  transform:translateX(20px);
}

/* SLIDER */
.slider{
  -webkit-appearance:none;
  width:100%;
  height:6px;
  border-radius:10px;
  background:linear-gradient(90deg,red,#300000);
  margin-top:10px;
}

.slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:red;
  box-shadow:0 0 10px red;
}

/* SELECT */
select{
  width:100%;
  padding:12px;
  border-radius:10px;
  margin-top:15px;
  background:#1a1a1a;
  color:white;
  border:1px solid red;
}

/* RADIO */
.radio{
  margin-top:10px;
  display:flex;
  align-items:center;
  gap:10px;
}

/* BTN */
.btn{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(red,#700000);
  text-align:center;
  font-weight:bold;
}

/* STATUS */
#status{
  font-size:12px;
  text-align:center;
  color:#aaa;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>VETRIX</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button onclick="entrar()">ENTRAR</button>
    <p id="msg"></p>
  </div>
</div>

<!-- PANEL -->
<div id="panel">
  <div class="box">

    <div class="title">AUXILIO PANEL</div>
    <div class="line"></div>

    <p id="status"></p>

    <!-- TABS -->
    <div class="tabs">
      <div class="tab active" onclick="trocar(0)">Config</div>
      <div class="tab" onclick="trocar(1)">Info</div>
    </div>

    <!-- ABA 1 -->
    <div class="tab-content active">

      <div class="switch">
        <span>Ativar Função</span>
        <label>
          <input type="checkbox" hidden>
          <div class="toggle"></div>
        </label>
      </div>

      <div class="switch">
        <span>Ativar Ajuste</span>
        <label>
          <input type="checkbox" hidden>
          <div class="toggle"></div>
        </label>
      </div>

      <input type="range" min="0" max="100" value="0" class="slider" id="fov" oninput="updateFov()">
      <p id="fovTxt">Valor: 0</p>

      <select>
        <option>Modo Padrão</option>
        <option>Modo Avançado</option>
      </select>

      <div class="line"></div>

      <p>Tipo:</p>

      <div class="radio">
        <input type="radio" name="tipo"> Opção 1
      </div>

      <div class="radio">
        <input type="radio" name="tipo"> Opção 2
      </div>

      <div class="btn" onclick="apply()">APLICAR CONFIG</div>

    </div>

    <!-- ABA 2 -->
    <div class="tab-content">
      <p>Versão 1.0</p>
      <p>Sistema online</p>
    </div>

    <div class="btn" onclick="abrirFF()">ABRIR FREE FIRE</div>
    <div class="btn" onclick="logout()">SAIR</div>

  </div>
</div>

<script>
// FIREBASE
const firebaseConfig={
 apiKey:"AIzaSy...",
 databaseURL:"https://vetrix7-1d0cd-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// LOGIN
function entrar(){
  const key=keyInput.value;

  db.ref("keys").once("value").then(snap=>{
    let ok=false;

    snap.forEach(s=>{
      const k=s.val();
      if(k.key===key){
        ok=true;
        login.style.display="none";
        panel.style.display="block";
      }
    });

    if(!ok) msg.innerText="Key inválida";
  });
}

// UI
function trocar(i){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

  document.querySelectorAll(".tab")[i].classList.add("active");
  document.querySelectorAll(".tab-content")[i].classList.add("active");
}

function updateFov(){
  fovTxt.innerText="Valor: "+fov.value;
}

function apply(){
  alert("Aplicado!");
}

function abrirFF(){
  window.location.href="freefire://";
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
