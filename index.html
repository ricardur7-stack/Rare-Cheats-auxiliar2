<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUXILIO AURA CHEATS</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .panel {
      position: relative;
      z-index: 1;
      background: #111;
      border-radius: 12px;
      padding: 20px;
      width: 90%;
      max-width: 350px;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .divider {
      height: 2px;
      background: #FF0000;
      margin: 12px 0;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 15px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 8px;
      border-radius: 6px;
      background: #222;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: 0.2s;
    }

    .tab.active {
      background: #FF0000;
    }

    .content {
      display: none;
    }

    .content.active {
      display: block;
    }

    label {
      display: flex;
      align-items: center;
      margin: 8px 0;
      font-size: 14px;
    }

    input[type="checkbox"], input[type="radio"] {
      accent-color: #FF0000;
      margin-right: 8px;
      transform: scale(1.2);
    }

    input[type="range"] {
      width: 100%;
      margin: 10px 0;
    }

    select {
      width: 100%;
      padding: 6px;
      border: 2px solid #FF0000;
      border-radius: 6px;
      background: #111;
      color: white;
      margin-bottom: 10px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 18px;
      border: none;
      border-radius: 8px;
      background: #FF0000;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #cc0000;
    }

    .info p {
      margin: 6px 0;
    }
  </style>
</head>

<body>

<div id="particles-js"></div>

<div class="panel">
  <h2>AUXILIO AURA CHEATS</h2>
  <div class="divider"></div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('aimbot', this)">Aimbot</div>
    <div class="tab" onclick="showTab('info', this)">Info</div>
  </div>

  <div id="aimbot" class="content active">
    <label><input type="checkbox"> Ativar Auxílio</label>
    <label><input type="checkbox"> Ativar FOV</label>

    <input type="range" min="0" max="100" value="0" id="fovRange">
    <p>FOV: <span id="fovValue">0</span></p>

    <select>
      <option>Auxílio Head</option>
      <option>Auxílio Body</option>
      <option>Auxílio Full</option>
    </select>

    <div class="divider"></div>

    <p>Tipo de Aimbot:</p>
    <label><input type="radio" name="tipo"> Ao Atirar</label>
    <label><input type="radio" name="tipo"> Ao Olhar</label>
  </div>

  <div id="info" class="content info">
    <p><b>Dispositivo:</b> <span id="modelo"></span></p>
    <p><b>Key:</b> <span id="key"></span></p>

    <div class="divider"></div>
    <p><b>Dicas:</b> Ative funções no modo treinamento.</p>
  </div>

  <button class="btn" onclick="abrirJogo()">INJETAR FUNÇÕES NO JOGO</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>
  function showTab(id, el) {
    document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
    document.getElementById(id).classList.add('active');

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }

  // FOV
  const fovRange = document.getElementById("fovRange");
  const fovValue = document.getElementById("fovValue");

  fovRange.addEventListener("input", () => {
    fovValue.textContent = fovRange.value;
  });

  // Detectar dispositivo
  function getDeviceName() {
    const ua = navigator.userAgent;

    if (/iPhone/i.test(ua)) return "iPhone";
    if (/iPad/i.test(ua)) return "iPad";
    if (/Android/i.test(ua)) return "Android";
    return "Desconhecido";
  }

  document.getElementById("modelo").textContent = getDeviceName();
  document.getElementById("key").textContent = "auxiliorarecheats";


function abrirJogo() {

  const ua = navigator.userAgent;

  // ANDROID
  const androidMax =
  "intent://#Intent;package=com.dts.freefiremax;end";

  const androidNormal =
  "intent://#Intent;package=com.dts.freefireth;end";

  const androidStore =
  "https://play.google.com/store/apps/details?id=com.dts.freefireth";


  // IOS
  const iosMax = "freefiremax://";
  const iosNormal = "freefire://";

  const iosStore =
  "https://apps.apple.com/app/id1300146617";


  if (/android/i.test(ua)) {

      // Tenta Free Fire MAX
      window.location.href = androidMax;

      setTimeout(() => {

          // Se não abriu tenta normal
          window.location.href = androidNormal;

      },1500);


      setTimeout(() => {

          // fallback loja
          window.location.href = androidStore;

      },3000);


  } else if (/iPhone|iPad|iPod/i.test(ua)) {

      // Tenta MAX
      window.location.href = iosMax;

      setTimeout(() => {

          // tenta normal
          window.location.href = iosNormal;

      },1500);


      setTimeout(() => {

          // fallback App Store
          window.location.href = iosStore;

      },3000);

  } else {

      alert("Abra pelo celular.");

  }

}
<script>
  // Partículas
  particlesJS("particles-js", {
    particles: {
      number: { value: 50 },
      color: { value: "#FF0000" },
      shape: { type: "circle" },
      opacity: { value: 0.5 },
      size: { value: 3 },
      line_linked: {
        enable: true,
        distance: 150,
        color: "#FF0000",
        opacity: 0.4,
        width: 1
      },
      move: {
        enable: true,
        speed: 2
      }
    }
  });
</script>

</body>
</html>
