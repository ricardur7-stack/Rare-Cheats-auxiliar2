<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VETRIX</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system;
}

body{
  background:radial-gradient(circle,#1a0000,#000);
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:90%;
  max-width:320px;
  padding:30px;
  border-radius:20px;
  background:#0f0f0f;
  box-shadow:0 0 40px rgba(255,0,0,0.3);
  text-align:center;
  animation:fade .5s;
}

.card h2{
  color:red;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
  margin-top:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
  font-weight:bold;
}

/* PANEL */
#panel{
  display:none;
  padding:15px;
}

.box{
  max-width:420px;
  margin:auto;
  background:#0f0f0f;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(255,0,0,0.2);
}

/* HEADER */
.title{
  text-align:center;
  font-size:22px;
}

.line{
  height:2px;
  background:red;
  margin:10px 0 15px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
}

.tab{
  flex:1;
  padding:12px;
  border-radius:10px;
  background:#1a1a1a;
  text-align:center;
  transition:.3s;
}

.active{
  background:red;
}

/* CONTENT */
.tab-content{
  display:none;
}

.tab-content.active{
  display:block;
}

/* SLIDER BONITO */
.slider{
  -webkit-appearance:none;
  width:100%;
  height:6px;
  border-radius:10px;
  background:linear-gradient(90deg,red,#300000);
  margin-top:10px;
}

.slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:red;
  box-shadow:0 0 10px red;
}

/* BTN */
.btn{
  margin-top:15px;
  padding:14px;
  background:red;
  border-radius:10px;
  text-align:center;
}

/* STATUS */
#status{
  font-size:12px;
  text-align:center;
  color:#aaa;
}

/* ANIMA */
@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
}
</style>
</head>

<body>

<div id="login">
  <div class="card">
    <h2>VETRIX</h2>
    <input id="keyInput" placeholder="Digite sua KEY">
    <button onclick="entrar()">ENTRAR</button>
    <p id="msg"></p>
  </div>
</div>

<div id="panel">
  <div class="box">

    <div class="title">VETRIX PANEL</div>
    <div class="line"></div>

    <p id="status"></p>

    <div class="tabs">
      <div class="tab active" onclick="trocar(0)">Config</div>
      <div class="tab" onclick="trocar(1)">Info</div>
    </div>

    <!-- ABA 1 -->
    <div class="tab-content active">
      <p>FPS</p>
      <input type="range" min="30" max="120" value="60" class="slider" id="fps" oninput="fpsUpdate()">
      <p id="fpsTxt">60 FPS</p>

      <p>Delay</p>
      <input type="range" min="0" max="100" value="0" class="slider" id="delay" oninput="delayUpdate()">
      <p id="delayTxt">0%</p>

      <div class="btn" onclick="apply()">Aplicar Config</div>
    </div>

    <!-- ABA 2 -->
    <div class="tab-content">
      <p>Versão: 1.0</p>
      <p>Usuário ativo</p>
    </div>

    <div class="btn" onclick="abrirFF()">ABRIR FREE FIRE</div>
    <div class="btn" onclick="logout()">SAIR</div>

  </div>
</div>

<script>
// FIREBASE
const firebaseConfig={
 apiKey:"AIzaSyBlug6Fm9HjfWaaMOUHGNJVHpW97BvBF-g",
 authDomain:"vetrix7-1d0cd.firebaseapp.com",
 databaseURL:"https://vetrix7-1d0cd-default-rtdb.firebaseio.com",
 projectId:"vetrix7-1d0cd"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// AUTO LOGIN
const saved=localStorage.getItem("key");
if(saved) validar(saved);

function entrar(){
  const key=document.getElementById("keyInput").value;
  validar(key);
}

function validar(key){
  db.ref("keys").once("value").then(snap=>{
    let ok=false;

    snap.forEach(s=>{
      const k=s.val();

      if(k.key===key){
        const now=new Date();
        const exp=new Date(k.expiresAt);

        if(now<=exp){
          ok=true;

          localStorage.setItem("key",key);

          document.getElementById("login").style.display="none";
          document.getElementById("panel").style.display="block";

          document.getElementById("status").innerText=
            "Ativa até "+exp.toLocaleDateString();

          return true;
        }
      }
    });

    if(!ok) document.getElementById("msg").innerText="Key inválida";
  });
}

// TABS
function trocar(i){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

  document.querySelectorAll(".tab")[i].classList.add("active");
  document.querySelectorAll(".tab-content")[i].classList.add("active");
}

// UI
function fpsUpdate(){
  fpsTxt.innerText=fps.value+" FPS";
}

function delayUpdate(){
  delayTxt.innerText=delay.value+"%";
}

function apply(){
  alert("Config aplicada!");
}

function abrirFF(){
  window.location.href="freefire://";
  setTimeout(()=>{
    window.location.href="https://apps.apple.com/app/free-fire/id1300146617";
  },2000);
}

function logout(){
  localStorage.removeItem("key");
  location.reload();
}
</script>

</body>
</html>
